<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1240" height="1754" fill="url(#bg)"/>
  <rect x="64" y="64" width="1112" height="1626" rx="28" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>

  <rect x="96" y="96" width="1048" height="140" rx="22" fill="url(#accent)"/>
  <text x="140" y="165" fill="#ffffff" font-size="40" font-family="Segoe UI, Arial" font-weight="700">AIMate - Interview Q&amp;A (Page 3)</text>
  <text x="140" y="205" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Additional questions with short answers</text>

  <rect x="96" y="270" width="1048" height="1280" rx="18" fill="#0f172a" stroke="#1f2a44"/>

  <text x="120" y="320" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">1. How do you handle API failures in the UI?</text>
  <text x="120" y="350" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Async calls use try/catch; failures show toast alerts and safe fallbacks.</text>

  <text x="120" y="400" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">2. Why MongoDB for this project?</text>
  <text x="120" y="430" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Flexible schema fits evolving AI data like summaries, tags, action items.</text>

  <text x="120" y="480" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">3. How do you secure sensitive tokens?</text>
  <text x="120" y="510" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">JWT secret and OAuth keys live in env vars; Gmail tokens stored server-side.</text>

  <text x="120" y="560" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">4. How do you prevent slow AI responses?</text>
  <text x="120" y="590" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Async calls with loading states; errors handled with clear messages and retries.</text>

  <text x="120" y="640" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">5. Explain the meeting workflow.</text>
  <text x="120" y="670" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Audio upload to server, Whisper transcription, GPT summary, action items saved.</text>

  <text x="120" y="720" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">6. How do you keep the backend responsive?</text>
  <text x="120" y="750" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Compression middleware, indexed queries, and efficient endpoints.</text>

  <text x="120" y="800" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">7. Why Context API instead of Redux?</text>
  <text x="120" y="830" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">State needs are simple (auth + theme), so Context keeps it lightweight.</text>

  <text x="120" y="880" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">8. How do you validate inputs?</text>
  <text x="120" y="910" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Backend uses schema validation; UI enforces required fields and formats.</text>

  <text x="120" y="960" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">9. What makes the project scalable?</text>
  <text x="120" y="990" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Clear modular structure, service layer, and stateless API design.</text>

  <text x="120" y="1040" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">10. How would you test it?</text>
  <text x="120" y="1070" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Unit tests for services/controllers; integration tests for API routes.</text>

  <text x="96" y="1645" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial">Generated for AIMate - Feb 2026</text>
</svg>

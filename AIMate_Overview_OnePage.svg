<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1240" height="1754" fill="url(#bg)"/>

  <rect x="64" y="64" width="1112" height="1626" rx="28" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>

  <rect x="96" y="96" width="1048" height="140" rx="22" fill="url(#accent)"/>
  <text x="140" y="165" fill="#ffffff" font-size="40" font-family="Segoe UI, Arial" font-weight="700">AIMate - Interview Summary</text>
  <text x="140" y="205" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Full-stack AI productivity assistant</text>

  <text x="96" y="290" fill="#e2e8f0" font-size="26" font-family="Segoe UI, Arial" font-weight="700">30-Second Pitch</text>
  <text x="96" y="330" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">
    I built AIMate, a full-stack AI assistant that helps users manage tasks, expenses, meetings, and emails.
  </text>
  <text x="96" y="356" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">
    It uses AI for task breakdowns, meeting summaries, budget insights, and smart email replies.
  </text>

  <rect x="96" y="410" width="500" height="470" rx="18" fill="#0f172a" stroke="#1f2a44"/>
  <text x="120" y="450" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Frontend (React + Vite)</text>
  <text x="120" y="490" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- React SPA with protected routes and lazy loading</text>
  <text x="120" y="520" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Context API for auth and theme</text>
  <text x="120" y="550" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Tailwind CSS with dark and light mode</text>
  <text x="120" y="580" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Axios with JWT header interceptor</text>
  <text x="120" y="610" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Charts and toast notifications for UX</text>
  <text x="120" y="640" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- AI-driven UIs for tasks, meetings, expenses, emails</text>
  <text x="120" y="700" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial">Focus: performance, clean state, strong UX</text>

  <rect x="644" y="410" width="500" height="470" rx="18" fill="#0f172a" stroke="#1f2a44"/>
  <text x="668" y="450" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Backend (Node + Express)</text>
  <text x="668" y="490" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- REST API with MongoDB and Mongoose</text>
  <text x="668" y="520" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- JWT auth and bcrypt password hashing</text>
  <text x="668" y="550" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Indexed queries for performance</text>
  <text x="668" y="580" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- OpenAI GPT and Whisper services</text>
  <text x="668" y="610" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Gmail OAuth integration for email sync</text>
  <text x="668" y="640" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Audio uploads and transcription pipeline</text>
  <text x="668" y="700" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial">Focus: secure APIs, AI services, scalability</text>

  <rect x="96" y="920" width="1048" height="450" rx="18" fill="#0f172a" stroke="#1f2a44"/>
  <text x="120" y="960" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">What I Built</text>
  <text x="120" y="1000" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Tasks with AI goal breakdowns and priorities</text>
  <text x="120" y="1026" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Expenses with AI budget insights and categories</text>
  <text x="120" y="1052" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Meetings: audio upload, transcription, summaries</text>
  <text x="120" y="1078" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Action items that can convert into tasks</text>
  <text x="120" y="1104" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Emails: Gmail sync, AI draft, and send flow</text>
  <text x="120" y="1130" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Dashboard with charts and analytics overview</text>
  <text x="120" y="1156" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- Auth flow with token persistence and protected routes</text>
  <text x="120" y="1182" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">- AI services for tasks, meetings, expenses, emails</text>

  <rect x="96" y="1410" width="1048" height="230" rx="18" fill="#0f172a" stroke="#1f2a44"/>
  <text x="120" y="1450" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Why It Matters</text>
  <text x="120" y="1490" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Architecture: MVC, services, reusable UI</text>
  <text x="120" y="1520" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Security: JWT, bcrypt, OAuth</text>
  <text x="120" y="1550" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- Performance: code splitting, compression, indexes</text>
  <text x="120" y="1580" fill="#cbd5f5" font-size="18" font-family="Segoe UI, Arial">- AI automation: real productivity value</text>

  <text x="96" y="1685" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial">Generated for AIMate - Feb 2026</text>
</svg>

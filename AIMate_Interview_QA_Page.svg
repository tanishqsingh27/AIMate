<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1240" height="1754" fill="url(#bg)"/>
  <rect x="64" y="64" width="1112" height="1626" rx="28" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>

  <rect x="96" y="96" width="1048" height="140" rx="22" fill="url(#accent)"/>
  <text x="140" y="165" fill="#ffffff" font-size="40" font-family="Segoe UI, Arial" font-weight="700">AIMate - Interview Q&amp;A (Page 2)</text>
  <text x="140" y="205" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Concise questions with ready answers</text>

  <rect x="96" y="270" width="1048" height="1280" rx="18" fill="#0f172a" stroke="#1f2a44"/>

  <text x="120" y="320" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">1. What problem does AIMate solve?</text>
  <text x="120" y="350" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">It centralizes daily productivity: tasks, meetings, expenses, and emails,</text>
  <text x="120" y="372" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">and uses AI to reduce manual work like planning, summarizing, and drafting.</text>

  <text x="120" y="420" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">2. Why React + Vite?</text>
  <text x="120" y="450" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">React gives component reusability; Vite gives faster builds and HMR.</text>

  <text x="120" y="500" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">3. How do you handle authentication?</text>
  <text x="120" y="530" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">JWT tokens are stored in localStorage and attached via Axios interceptors.</text>
  <text x="120" y="552" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Protected routes check auth state before rendering app pages.</text>

  <text x="120" y="600" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">4. Where is AI used?</text>
  <text x="120" y="630" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">OpenAI GPT generates tasks, meeting summaries, and budget insights.</text>
  <text x="120" y="652" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Whisper transcribes meeting audio, and Gmail replies are AI-assisted.</text>

  <text x="120" y="700" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">5. How is Gmail integration done?</text>
  <text x="120" y="730" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">OAuth 2.0 for consent, token exchange, and Gmail API for sync and send.</text>

  <text x="120" y="780" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">6. What is your backend architecture?</text>
  <text x="120" y="810" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Express REST API with MVC and a service layer for external APIs.</text>

  <text x="120" y="860" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">7. How do you ensure performance?</text>
  <text x="120" y="890" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Frontend uses lazy loading and code splitting; backend uses compression and DB indexes.</text>

  <text x="120" y="940" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">8. How do you handle errors?</text>
  <text x="120" y="970" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Central error middleware returns clean JSON; UI shows toasts and loading states.</text>

  <text x="120" y="1020" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">9. What are the main database models?</text>
  <text x="120" y="1050" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">User, Task, Expense, Meeting, Email with user references and indexes.</text>

  <text x="120" y="1100" fill="#ffffff" font-size="22" font-family="Segoe UI, Arial" font-weight="700">10. What would you improve next?</text>
  <text x="120" y="1130" fill="#cbd5f5" font-size="17" font-family="Segoe UI, Arial">Add tests, caching, and real-time updates; improve analytics and scalability.</text>

  <text x="96" y="1645" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial">Generated for AIMate - Feb 2026</text>
</svg>
